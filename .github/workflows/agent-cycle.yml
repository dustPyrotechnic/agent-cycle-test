name: Agent Cycle

# Central repository's own listener. It calls the reusable engine via a local
# reference so this repository exercises the exact same production path that
# target repositories use through their listener templates.

on:
  issues:
    # Every issue is recognized. opened/reopened/edited start or re-run a round;
    # labeled is kept only so an optional solve-it label can re-trigger manually.
    types: [opened, reopened, edited, labeled]
  repository_dispatch:
    types: [agent-relay]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Existing issue number
        required: true
        type: string
      provider:
        description: Anthropic-compatible model provider
        required: true
        default: deepseek
        type: choice
        options:
          - deepseek
          - mimo
      max_rounds:
        description: Hard maximum number of rounds
        required: true
        default: "5"
        type: string
      base_ref:
        description: Optional base ref for the agent task branch
        required: false
        default: ""
        type: string
      base_sha:
        description: Optional resolved base commit for the agent task branch
        required: false
        default: ""
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  cycle:
    if: >-
      github.event_name == 'repository_dispatch' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issues' &&
        !contains(github.event.issue.labels.*.name, 'agent-benchmark') &&
        github.event.action != 'labeled'
      ) ||
      (
        github.event_name == 'issues' &&
        !contains(github.event.issue.labels.*.name, 'agent-benchmark') &&
        github.event.action == 'labeled' &&
        github.event.label.name == 'solve-it'
      )
    uses: ./.github/workflows/reusable-agent-cycle.yml
    with:
      issue_number: ${{ format('{0}', github.event.issue.number || github.event.client_payload.issue_number || inputs.issue_number) }}
      provider: ${{ github.event.client_payload.provider || inputs.provider || 'deepseek' }}
      max_rounds: ${{ format('{0}', github.event.client_payload.max_rounds || inputs.max_rounds || '5') }}
      base_ref: ${{ github.event.client_payload.base_ref || inputs.base_ref || '' }}
      base_sha: ${{ github.event.client_payload.base_sha || inputs.base_sha || '' }}
      trusted_associations: ${{ vars.AGENT_TRUSTED_ASSOCIATIONS || 'OWNER' }}
    secrets:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
